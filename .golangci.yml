version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - hugeParam
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/Malvi1697/lazyglab

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
